<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mission Control Demo</title>
  <script src="/openmct/openmct.js"></script>
</head>
<body>
  <script src="/drone-plugin.js"></script>
  <script>
    openmct.setAssetPath('/openmct');

    // Standard Open MCT plugins
    openmct.install(openmct.plugins.LocalStorage());   // saves user layouts in the browser
    openmct.install(openmct.plugins.MyItems());        // "My Items" folder for user-made displays
    openmct.install(openmct.plugins.UTCTimeSystem());
    openmct.install(openmct.plugins.Espresso());       // dark mission-control theme

    // Time conductor: default to "live" mode showing the last 15 minutes
    openmct.install(openmct.plugins.Conductor({
      menuOptions: [
        { name: 'Realtime', timeSystem: 'utc', clock: 'local',
          clockOffsets: { start: -15 * 60 * 1000, end: 30 * 1000 } },
        { name: 'Fixed', timeSystem: 'utc',
          bounds: { start: Date.now() - 15 * 60 * 1000, end: Date.now() } }
      ]
    }));

    // Set initial time mode (API name changed across versions, so try both)
    try {
      if (openmct.time.setClock) {
        openmct.time.setClock('local');
        openmct.time.setClockOffsets({ start: -15 * 60 * 1000, end: 30 * 1000 });
        openmct.time.setTimeSystem('utc');
      } else {
        openmct.time.clock('local', { start: -15 * 60 * 1000, end: 30 * 1000 });
        openmct.time.timeSystem('utc');
      }
    } catch (e) {
      console.warn('Time init fallback:', e);
    }

    // Our plugin: the drone, its telemetry channels, live + historical data
    openmct.install(DronePlugin());

    openmct.start();
  </script>
</body>
</html>
